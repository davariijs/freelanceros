name: API CI/CD

on:
  push:
    paths:
      - "apps/api/**"
      - "packages/database/**"
    branches:
      - main
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/database/**"
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @freelanceos/api test
